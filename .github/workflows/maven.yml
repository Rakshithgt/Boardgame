name: Build and Deploy to Nexus

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11' # Matches your pom.xml java.version
          distribution: 'temurin'
          cache: maven
          # IMPORTANT: This ID must match the <id> in your pom.xml distributionManagement
          server-id: maven-snapshots 
          server-username: NEXUS_USERNAME # This refers to the ENV var below
          server-password: NEXUS_PASSWORD # This refers to the ENV var below
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Deploy to Nexus
        run: mvn clean deploy -DskipTests
